server {
    listen 80;
    server_name cow.zenoly.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    root /home/nestjs-project1/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3101/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api-docs {
        proxy_pass http://127.0.0.1:3101/api-docs;
        proxy_set_header Host $host;
    }

    location /api-docs/ {
        proxy_pass http://127.0.0.1:3101/api-docs/;
        proxy_set_header Host $host;
    }

    location = /api-docs-json {
        proxy_pass http://127.0.0.1:3101/api-docs-json;
        proxy_set_header Host $host;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;
}
